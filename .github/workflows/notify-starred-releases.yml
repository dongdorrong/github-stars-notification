name: Notify Starred Releases
on:
  schedule: [cron: '0 23,5,8 * * *']  # 매일 한국시간 08시, 14시, 17시에 실행 (UTC 기준)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.detect.outputs.has_new }}
      payloads: ${{ steps.detect.outputs.payloads }}
      message_count: ${{ steps.detect.outputs.message_count }}
      feed_path: ${{ steps.detect.outputs.feed_path }}
      release_count: ${{ steps.detect.outputs.release_count }}
      special_release_count: ${{ steps.detect.outputs.special_release_count }}
      notify_reason: ${{ steps.detect.outputs.notify_reason }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Cache release data
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-releases-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-releases-cache-
      
      - name: List starred repos
        id: star
        run: |
          gh api /user/starred --paginate \
            | jq -r '.[].full_name' > repos.txt
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Detect new releases
        id: detect
        run: python .github/scripts/check_release.py
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload deterministic release feed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-feed
          path: ${{ steps.detect.outputs.feed_path || '.cache/release-feed.json' }}
          if-no-files-found: ignore

      - name: Summarize detection
        if: always()
        run: |
          {
            echo "## GitHub starred release check"
            echo "- notify: ${{ steps.detect.outputs.has_new }}"
            echo "- reason: ${{ steps.detect.outputs.notify_reason }}"
            echo "- releases: ${{ steps.detect.outputs.release_count }}"
            echo "- special releases: ${{ steps.detect.outputs.special_release_count }}"
            echo "- feed: ${{ steps.detect.outputs.feed_path }}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    needs: check
    if: needs.check.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.check.outputs.payloads || '[{}]') }}
    steps:
      - name: Send Slack Message
        env:
          # SECURITY: release title/name/url은 외부 저장소 관리자가 제어할 수 있다.
          # GitHub expression을 inline shell 문자열에 직접 넣으면 quote-break injection이 가능하므로
          # 반드시 env로 전달하고 run 블록에서는 double-quoted shell variable만 사용한다.
          SLACK_PAYLOAD: ${{ toJSON(matrix) }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "Slack 메시지 전송 중..."
          
          # 메시지 순서에 따른 지연 (Rate limit 방지)
          MESSAGE_INDEX="${{ strategy.job-index }}"
          if [ ! -z "$MESSAGE_INDEX" ] && [ "$MESSAGE_INDEX" -gt 0 ]; then
            DELAY=$((MESSAGE_INDEX * 3))
            echo "${DELAY}초 대기 중... (Rate limit 방지)"
            sleep $DELAY
          fi
          
          echo "Payload 전송 중..."
          # check_release.py에서 이미 Slack 형식으로 준비된 데이터를 그대로 사용
          printf '%s' "$SLACK_PAYLOAD" | curl --fail --show-error --silent -X POST \
            -H "Content-Type: application/json" \
            -d @- \
            "$SLACK_WEBHOOK_URL"
          
          echo "메시지 전송 완료"
